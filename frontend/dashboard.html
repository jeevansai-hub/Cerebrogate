<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CerebroGate - Live Dashboard</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .dashboard-container {
      max-width: 1200px;
      margin: 60px auto;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    
    .header-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .live-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      background-color: #22c55e;
      border-radius: 50%;
      margin-right: 8px;
      box-shadow: 0 0 10px #22c55e;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .metric-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .metric-title {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .metric-value {
      font-size: 36px;
      font-weight: 600;
      letter-spacing: -1px;
    }

    .table-container {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      overflow: hidden;
      margin-top: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    th, td {
      padding: 16px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      font-size: 14px;
    }
    
    th {
      color: var(--text-secondary);
      font-weight: 500;
      background: rgba(0,0,0,0.3);
    }

    tr:last-child td {
      border-bottom: none;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo">CerebroGate</a>
    <div class="nav-cta">
      <a href="app.html" class="btn btn-outline" style="padding: 8px 16px; font-size: 13px;">Generate New App</a>
    </div>
  </nav>

  <main class="dashboard-container animate-fade">
    <div class="header-info">
      <h1 style="font-size: 28px; font-weight: 500;">System Overview</h1>
      <div style="font-size: 14px; font-weight: 500;"><span class="live-dot"></span> Live Metrics</div>
    </div>

    <!-- Top KPIs -->
    <div class="metrics-grid">
      <div class="metric-card">
        <div class="metric-title">Credits Used</div>
        <div class="metric-value" id="creditsUsed" style="color: #ef4444;">$0.00</div>
      </div>
      <div class="metric-card">
        <div class="metric-title">Credits Left</div>
        <div class="metric-value" id="creditsLeft" style="color: #22c55e;">$15.00</div>
      </div>
      <div class="metric-card">
        <div class="metric-title">Hit Ratio</div>
        <div class="metric-value" id="cacheHitRate">0%</div>
      </div>
      <div class="metric-card">
        <div class="metric-title">Cost Saved vs GPT-4</div>
        <div class="metric-value" id="costSaved">$0.00</div>
      </div>
    </div>

    <!-- Recent Requests -->
    <div style="margin-top: 16px;">
      <h2 style="font-size: 18px; font-weight: 500; margin-bottom: 16px;">Recent Requests</h2>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Timestamp</th>
              <th>Complexity</th>
              <th>Routed To</th>
              <th>Cache</th>
              <th>Duration</th>
            </tr>
          </thead>
          <tbody id="recentRqsBody">
             <tr>
               <td colspan="5" style="text-align:center; color: var(--text-secondary);">Waiting for data...</td>
             </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script>
    async function fetchStats() {
      try {
        const res = await fetch('http://localhost:3000/api/stats');
        if (!res.ok) return;
        const stats = await res.json();
        
        // Update new Credit System
        document.getElementById('creditsUsed').innerText = '$' + stats.credits_used.toFixed(3);
        document.getElementById('creditsLeft').innerText = '$' + stats.credits_left.toFixed(3);
        document.getElementById('costSaved').innerText = '$' + stats.cost_saved.toFixed(3);
        
        const hitRate = stats.total_requests > 0 ? ((stats.cache_hits / stats.total_requests) * 100).toFixed(1) : 0;
        document.getElementById('cacheHitRate').innerText = hitRate + '%';
        
        document.getElementById('avgResponseTime').innerText = stats.avg_response_time + 'ms';

        const tbody = document.getElementById('recentRqsBody');
        if (stats.recent_requests && stats.recent_requests.length > 0) {
          tbody.innerHTML = '';
          stats.recent_requests.forEach(req => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
              <td style="color:var(--text-secondary)">${new Date(req.timestamp).toLocaleTimeString()}</td>
              <td>${req.complexity}</td>
              <td>${req.provider}</td>
              <td>${req.cache_hit ? '<span style="color:#22c55e">Hits</span>' : 'Miss'}</td>
              <td>${req.duration}ms</td>
            `;
            tbody.appendChild(tr);
          });
        }
      } catch (e) {
        console.error("Failed to fetch dashboard stats", e);
      }
    }

    // Initial fetch and poll every 10 seconds
    fetchStats();
    setInterval(fetchStats, 10000);
  </script>
</body>
</html>
